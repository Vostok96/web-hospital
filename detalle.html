        // Lógica para leer qué examen se pidió y mostrarlo
        function loadExamDetails() {
            const params = new URLSearchParams(window.location.search);
            const examId = params.get('id'); // Obtiene el id de la URL (ej. ?id=hemograma)

            if (examId && examsDB[examId]) {
                const data = examsDB[examId];
                
                // Rellenar el HTML con los datos
                document.getElementById('exam-title').innerText = data.title;
                document.getElementById('exam-code').innerText = data.code;
                document.getElementById('exam-sample').innerText = data.sample;
                document.getElementById('exam-tube').innerHTML = `<span class="tube-color-circle" style="background-color: ${data.tubeColor}"></span> ${data.tube}`;
                document.getElementById('exam-prep').innerText = data.prep;
                document.getElementById('exam-volume').innerText = data.volume;
                document.getElementById('exam-time').innerText = data.time;
                document.getElementById('exam-method').innerText = data.method;
                document.getElementById('exam-desc').innerText = data.desc;
                
                // Cambiar icono
                document.getElementById('exam-icon').className = `fa-solid ${data.icon}`;
            } else {
                document.getElementById('exam-title').innerText = "Examen no encontrado";
                document.getElementById('exam-desc').innerText = "Lo sentimos, no tenemos información para este código.";
            }
        }

        // Ejecutar al cargar la página
        window.onload = loadExamDetails;
    </script>
