<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title>Panel de Laboratorio - Hospital Victor Ramos Guardia</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="logo-hospital.png" type="image/png">
    <link rel="preload" href="fondo.webp" as="image">
    <style>
        .admin-shell {
            width: 100%;
            max-width: 1280px;
        }

        .admin-toolbar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
            width: 100%;
            margin-bottom: 20px;
        }

        .admin-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.16);
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 20px;
        }

        .admin-panel h3 {
            color: #003366;
            margin-bottom: 8px;
        }

        .admin-field-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: #24425c;
            margin-bottom: 8px;
        }

        .admin-field {
            width: 100%;
            border: 1px solid rgba(0, 51, 102, 0.18);
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 0.95rem;
            color: #213547;
            background: rgba(255, 255, 255, 0.92);
        }

        .admin-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .admin-btn {
            border: none;
            border-radius: 999px;
            padding: 12px 18px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        }

        .admin-btn:hover {
            transform: translateY(-1px);
        }

        .admin-btn:disabled {
            cursor: wait;
            opacity: 0.7;
            transform: none;
        }

        .admin-btn-primary {
            background: linear-gradient(135deg, #00509e 0%, #003366 100%);
            color: white;
            box-shadow: 0 8px 20px rgba(0, 80, 158, 0.25);
        }

        .admin-btn-secondary {
            background: rgba(0, 80, 158, 0.1);
            color: #003366;
            border: 1px solid rgba(0, 80, 158, 0.2);
        }

        .admin-status {
            margin-top: 12px;
            font-size: 0.92rem;
            font-weight: 500;
        }

        .admin-status-muted {
            color: #4f6374;
        }

        .admin-status-success {
            color: #1b6a35;
        }

        .admin-status-error {
            color: #a52a2a;
        }

        .admin-summary {
            margin-top: 6px;
            color: #24425c;
            font-size: 0.92rem;
        }

        .admin-groups {
            display: grid;
            gap: 18px;
        }

        .admin-group {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.35);
        }

        .admin-group-title {
            background: linear-gradient(135deg, #003366 0%, #00509e 100%);
            color: white;
            font-weight: 800;
            letter-spacing: 0.04em;
            padding: 16px 20px;
        }

        .admin-group-body {
            padding: 8px 16px 16px;
        }

        .admin-exam-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 18px;
            padding: 14px 4px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }

        .admin-exam-row:last-child {
            border-bottom: none;
        }

        .admin-exam-copy {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .admin-exam-name {
            color: #1f2d3d;
            font-weight: 700;
        }

        .admin-exam-meta {
            color: #5a6f81;
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .admin-toggle-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .admin-toggle-label {
            min-width: 106px;
            text-align: center;
            font-size: 0.76rem;
            padding: 7px 12px;
            border-radius: 999px;
            font-weight: 800;
            letter-spacing: 0.04em;
            color: white;
        }

        .admin-toggle {
            width: 54px;
            height: 28px;
            accent-color: #00509e;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .admin-exam-row {
                align-items: flex-start;
                flex-direction: column;
            }

            .admin-toggle-wrap {
                width: 100%;
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
    <a href="laboratorio.html" class="btn-volver" style="z-index: 10001;">
        <i class="fa-solid fa-flask-vial"></i> Volver a Laboratorio
    </a>

    <div class="overlay">
        <header>
            <div class="header-branding">
                <img src="logo-hospital.png" alt="Logo HVRG" class="header-logo">
                <div class="header-text-block">
                    <h1>HOSPITAL VICTOR RAMOS GUARDIA</h1>
                    <h2>Panel administrativo de disponibilidad</h2>
                </div>
            </div>
            <div class="dept-title">Actualizacion central de examenes</div>
        </header>

        <div class="admin-shell">
            <div class="admin-toolbar">
                <div class="admin-panel">
                    <h3><i class="fa-solid fa-lock"></i> Acceso</h3>
                    <label class="admin-field-label" for="adminPassword">Clave de administrador</label>
                    <input id="adminPassword" class="admin-field" type="password" placeholder="Ingresa tu clave">
                </div>

                <div class="admin-panel">
                    <h3><i class="fa-solid fa-user-shield"></i> Responsable</h3>
                    <label class="admin-field-label" for="updatedBy">Nombre o cargo</label>
                    <input id="updatedBy" class="admin-field" type="text" placeholder="Ej. Lic. Laboratorio">
                </div>

                <div class="admin-panel">
                    <h3><i class="fa-solid fa-magnifying-glass"></i> Buscar</h3>
                    <label class="admin-field-label" for="adminSearch">Filtrar examen</label>
                    <input id="adminSearch" class="admin-field" type="text" placeholder="Glucosa, hemograma, PCR...">
                </div>
            </div>

            <div class="admin-panel" style="margin-bottom: 20px;">
                <div class="admin-actions">
                    <button id="saveStatuses" class="admin-btn admin-btn-primary">
                        <i class="fa-solid fa-cloud-arrow-up"></i> Guardar cambios
                    </button>
                    <button id="markAllAvailable" class="admin-btn admin-btn-secondary">
                        <i class="fa-solid fa-circle-check"></i> Marcar todo disponible
                    </button>
                    <button id="markAllUnavailable" class="admin-btn admin-btn-secondary">
                        <i class="fa-solid fa-circle-xmark"></i> Marcar todo agotado
                    </button>
                </div>
                <div id="adminStatus" class="admin-status admin-status-muted">
                    Cargando panel administrativo...
                </div>
                <div id="adminSummary" class="admin-summary"></div>
                <div id="adminUpdatedMeta" class="admin-summary"></div>
            </div>

            <div id="adminGroups" class="admin-groups"></div>
        </div>
    </div>

    <script type="module" src="admin-laboratorio.js"></script>
</body>
</html>
